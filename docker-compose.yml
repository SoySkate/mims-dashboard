services:
  db:
    image: postgres:16
    container_name: mims_dashboard_db
    environment:
      POSTGRES_USER: mims
      POSTGRES_PASSWORD: mims_dev_pw
      POSTGRES_DB: mims_dashboard_dev
    ports:
      # Host 5433 -> container 5432, to avoid clashing with any local Postgres on 5432.
      - "5433:5432"
    volumes:
      - mims_dashboard_pgdata:/var/lib/postgresql/data
      # Auto-run on FIRST init only (empty data dir): extensions, then schema+seed.
      - ./db/extensions.sql:/docker-entrypoint-initdb.d/00-extensions.sql:ro
      - ./db/dump.sql:/docker-entrypoint-initdb.d/01-dump.sql:ro
      - ./db/users.sql:/docker-entrypoint-initdb.d/02-users.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mims -d mims_dashboard_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mims_dashboard_pgdata:
